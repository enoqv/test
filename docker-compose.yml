services:
  postgres:
    image: postgres:16.12-alpine@sha256:97ff59a4e30e08d1c11bdcd9455e7832368c0572b576c9092cde2df4ae5552a3
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: members
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7.4-alpine@sha256:8b81dd37ff027bec4e516d41acfbe9fe2460070dc6d4a4570a2ac5b9d59df065
    ports:
      - "6379:6379"

  app:
    build: .
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/members?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      JWT_SECRET: "dev-secret-change-me"
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis

volumes:
  pgdata:
