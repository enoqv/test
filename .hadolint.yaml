# Hadolint rules: https://github.com/hadolint/hadolint/wiki
#
# Policy:
#  - Every FROM must be pinned to a digest (not just a tag).
#  - No :latest.
#  - We pin package versions where practical; distroless has no package manager.
#
# NOTE: hadolint has no built-in rule requiring `@sha256:` digest pinning.
# DL3006/DL3007 only enforce "has a tag" and "not :latest".  The digest
# requirement is enforced by a separate awk step in .github/workflows/ci.yml
# ("Enforce FROM @sha256 digest pin").  When hadolint adds native support
# (tracking upstream issue hadolint/hadolint#773), that step can be removed
# in favour of the native rule.

failure-threshold: warning

# Treat these as errors rather than info/warnings.
override:
  error:
    - DL3007  # Using latest
    - DL3022  # COPY --from should reference previously defined FROM alias
    - DL3023  # COPY --from cannot reference its own FROM
    - DL3024  # FROM aliases must be unique
    - DL3026  # Use only official FROM images

# Ignore rules that don't apply to our multi-stage distroless build.
ignored:
  # DL3018: apk add without --no-cache. We're distroless runtime, no apk at all.
  - DL3018
  # DL3008: apt-get pin version. No apt in our build.
  - DL3008

trustedRegistries:
  - docker.io
  - gcr.io
  - ghcr.io
