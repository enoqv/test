# Squid configuration for the devcontainer.
#
# Acts as the sole egress for the sandboxed `dev` container. The allowlist is
# loaded from /etc/squid/lists/allowed-domains.txt (one domain per line,
# leading dot for subdomain-wildcard, e.g. `.github.com`). The list is
# auto-reloaded by the entrypoint when the file changes; for a manual nudge
# run `reload-squid.sh` from inside the dev container.

http_port 3128

# --- ACLs ---

# Clients allowed to use the proxy = anyone on the internal docker network.
# The `internal` compose network uses RFC1918 addressing under 172.16.0.0/12
# and 192.168.0.0/16 by default; we whitelist the common private ranges.
acl localnet src 10.0.0.0/8
acl localnet src 172.16.0.0/12
acl localnet src 192.168.0.0/16
acl localnet src fc00::/7
acl localnet src fe80::/10

# Note: squid 6 ships a built-in `localhost` ACL covering 127.0.0.1 and ::1,
# so we don't redeclare it here — doing so triggers splay-tree duplicate
# warnings on every (re)load.

# Standard safe ports. Only HTTP (80) and HTTPS (443) are enabled; the
# remaining defaults are commented out to shrink the allowed egress surface.
acl SSL_ports port 443
acl Safe_ports port 80          # http
acl Safe_ports port 443         # https
#acl Safe_ports port 21          # ftp
#acl Safe_ports port 70          # gopher
#acl Safe_ports port 210         # wais
#acl Safe_ports port 1025-65535  # unregistered ports
#acl Safe_ports port 280         # http-mgmt
#acl Safe_ports port 488         # gss-http
#acl Safe_ports port 591         # filemaker
#acl Safe_ports port 777         # multiling http
acl CONNECT method CONNECT

# Destination allowlist. Loaded from file so it can be changed without
# rebuilding the image; the entrypoint runs `squid -k reconfigure` whenever
# the file changes.
acl allowed_domains dstdomain "/etc/squid/lists/allowed-domains.txt"

# Same allowlist applied against the TLS SNI inside CONNECT tunnels.
# Without this, a client could `CONNECT api.github.com:443` and then send
# a TLS handshake with SNI for an arbitrary host — `dstdomain` only sees
# the CONNECT host, not the SNI, so the proxy would happily forward bytes
# to wherever DNS for the CONNECT host resolves to.
acl allowed_sni ssl::server_name "/etc/squid/lists/allowed-domains.txt"

# --- Access rules ---

http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports

# Cache manager only reachable from localhost inside the squid container.
http_access allow localhost manager
http_access deny manager

# Default-deny for anything not in the allowlist.
http_access allow localnet allowed_domains
http_access deny all

# --- TLS SNI verification (peek-and-splice, no MITM) ---
# step1: peek at ClientHello to extract SNI without terminating TLS.
# Then terminate the connection if SNI is not in the allowlist; otherwise
# splice (forward bytes transparently). No certificate generation needed
# because we never bump — clients see the real upstream cert.
acl step1 at_step SslBump1
ssl_bump peek step1
ssl_bump terminate !allowed_sni
ssl_bump splice all

# --- Logging / misc ---

# Send all logs to stdout. The entrypoint symlinks
# /var/log/squid/access.log and /var/log/squid/cache.log to /dev/stdout
# so squid writes log records directly to the container's stdout stream
# (`docker logs squid`). logfile_rotate=0 disables squid's internal
# rotation — Docker handles log rotation externally.
# References:
#   https://github.com/muccg/docker-squid-deb-proxy/blob/master/Dockerfile
#   https://github.com/scbunn/docker-squid/issues/5
# Suppress the compose healthcheck probes from the access log. The
# probe URL is a synthetic .invalid domain (RFC 6761 reserved, never
# resolvable) used only by the docker-compose healthcheck — see
# `services.squid.healthcheck` in docker-compose.yml. Squid still
# evaluates http_access for these requests and denies them; we just
# don't log the per-5s noise.
acl healthcheck_probe dstdomain healthcheck.invalid
access_log stdio:/var/log/squid/access.log squid !healthcheck_probe
cache_log /var/log/squid/cache.log
logfile_rotate 0
pid_filename none

# Strip the forwarded-for header so downstream servers can't fingerprint
# individual dev containers via client IP. `via` is left at its default
# (`on`) — for HTTPS traffic squid only sees the CONNECT envelope, so the
# Via header never reaches upstream servers anyway, and keeping it on
# preserves RFC 9110 loop detection without log noise.
forwarded_for off
httpd_suppress_version_string on

# Modest in-memory cache; disk cache disabled (ephemeral dev use).
cache_mem 64 MB
maximum_object_size_in_memory 512 KB
cache deny all

# Shutdown quickly during `docker compose down`.
shutdown_lifetime 5 seconds
