# Devcontainer compose stack.
#
# Security model: the `dev` service is attached ONLY to the `internal` Docker
# network, which has `internal: true` (no NAT to the host/internet). The `squid`
# service sits on both `internal` and `external` networks, so it is the only
# egress path. Even if HTTP_PROXY is bypassed, direct outbound traffic from the
# dev container has no route. All HTTP(S) traffic is filtered by Squid using
# the dynamic allowlist at ./squid/lists/allowed-domains.txt.
#
# The `postgres` and `redis` services are colocated on the same `internal`
# network so the Go app inside `dev` can reach them by container name. They
# have no `ports:` mapping (intentional — they are dev-loop only; the root
# docker-compose.yml at the repo top-level remains the production-shaped
# stack with host port mappings and the `app` service).

services:
  dev:
    build:
      # Build context is the repo root so the Dockerfile can read go.mod
      # to derive the Go toolchain version (keeps Dockerfile in sync with
      # the project's declared Go version).
      context: ..
      dockerfile: .devcontainer/Dockerfile
      args:
        TZ: "${TZ:-Asia/Taipei}"
        GIT_DELTA_VERSION: "0.18.2"
        ZSH_IN_DOCKER_VERSION: "1.2.0"
    # Use docker-init (tini) as PID 1 so detached `claude` /
    # `go test`-spawned subprocesses get reaped instead of accumulating
    # as zombies during long-running sessions.
    init: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    mem_limit: 4g
    pids_limit: 1024
    volumes:
      - ..:/workspace:delegated
      - claude-code-bashhistory:/commandhistory
      - claude-code-config:/home/dever/.claude
      - go-cache:/home/dever/.cache/go-build
      - go-mod-cache:/home/dever/go/pkg/mod
      # Mount the squid lists directory (not a single file) so editor
      # atomic-rename saves are visible to inotify inside the squid
      # container — see entrypoint.sh for the hot-reload watcher.
      - ./squid/lists:/etc/squid/lists:ro
    networks:
      - internal
    depends_on:
      squid:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sleep infinity

  postgres:
    image: postgres:16.13-alpine@sha256:20edbde7749f822887a1a022ad526fde0a47d6b2be9a8364433605cf65099416
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: members
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d members"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7.4-alpine@sha256:8b81dd37ff027bec4e516d41acfbe9fe2460070dc6d4a4570a2ac5b9d59df065
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  squid:
    build:
      context: ./squid
      dockerfile: Dockerfile
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN          # entrypoint chowns log/cache dirs at startup
      - DAC_OVERRIDE   # entrypoint chmods /dev/stdout for log forwarding
      - SETUID         # squid drops root -> squid user
      - SETGID
    mem_limit: 512m
    pids_limit: 64
    tmpfs:
      # read_only=true makes / RO; squid still needs scratch space at
      # these paths (log symlinks, cache metadata, runtime files).
      - /var/log/squid
      - /var/cache/squid
      - /run/squid
      - /tmp
    volumes:
      - ./squid/squid.conf:/etc/squid/squid.conf:ro
      - ./squid/lists:/etc/squid/lists:ro
      - squid-cache:/var/spool/squid
      # No /var/log/squid volume: the entrypoint symlinks the log
      # files to /dev/stdout so all records stream to `docker logs`.
    networks:
      - internal
      - external
    healthcheck:
      # Send a real HTTP request that we expect squid to deny (the
      # `.invalid` TLD is reserved by RFC 6761 and will never be in the
      # allowlist), then verify squid replies with any HTTP/1.x status.
      # This exercises the listener, HTTP parser, and ACL engine —
      # producing a well-formed `TCP_DENIED/403` access-log entry instead
      # of the `error:transaction-end-before-headers` noise that a bare
      # TCP-open-and-close probe generates. `HIER_NONE/-` in the log
      # confirms squid never forwards the request upstream. Uses bash's
      # built-in /dev/tcp so we don't depend on curl / nc.
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/3128 && printf \"GET http://healthcheck.invalid/ HTTP/1.0\\r\\n\\r\\n\" >&3 && IFS= read -r -t 2 line <&3 && [[ $$line == HTTP/1.[01]\\ * ]]'"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

networks:
  # No external connectivity; only containers on this network can talk.
  internal:
    internal: true
  # Standard bridge network with NAT to host/internet (squid only).
  external:
    driver: bridge

volumes:
  claude-code-bashhistory:
  claude-code-config:
  go-cache:
  go-mod-cache:
  pgdata:
  squid-cache:
