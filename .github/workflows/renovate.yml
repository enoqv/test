name: Renovate

# Runs Renovate on a fixed schedule from this repository itself, instead
# of relying on the Mend-hosted Renovate GitHub App.  Configuration lives
# in ./renovate.json.
#
# Prerequisites (one-time setup):
#
#   1. Create a Personal Access Token (or GitHub App installation token)
#      with scopes:
#          contents: write      (create branches, push commits)
#          pull-requests: write (open / update / close PRs)
#          workflows: write     (update .github/workflows/*.yml files)
#      A fine-grained PAT is recommended; restrict to just this repo.
#
#   2. Save it as a repository secret named RENOVATE_TOKEN.
#
# Notes:
#
#   - The workflow's built-in GITHUB_TOKEN is NOT used for Renovate's
#     git operations, because GITHUB_TOKEN cannot push changes that
#     modify .github/workflows/*.yml files (GitHub blocks this by design).
#     Hence the explicit RENOVATE_TOKEN.
#
#   - The schedule here controls WHEN Renovate runs. The "schedule"
#     field inside renovate.json controls when it is allowed to OPEN
#     PRs. Both must pass for a PR to appear.
#
#   - Concurrency ensures only one Renovate run at a time; parallel
#     runs can step on each other when updating the same branches.

on:
  schedule:
    # Every 6 hours (00:00, 06:00, 12:00, 18:00 UTC).
    # Rationale: vulnerabilityAlerts in renovate.json bypass schedule /
    # prHourlyLimit / minimumReleaseAge once Renovate runs, but Renovate
    # still only *runs* when this cron fires.  Going from daily to every
    # 6 hours bounds worst-case CVE-to-PR latency at ~6 hours for the
    # self-hosted path.  (For sub-hour response, Dependabot alerts cover
    # the instant-notification channel in parallel.)
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      logLevel:
        description: "Renovate log level"
        type: choice
        options: [info, debug]
        default: info
      dryRun:
        description: "Dry run (log what would change, do not open PRs)"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: renovate
  cancel-in-progress: false

jobs:
  renovate:
    name: Run Renovate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Renovate
        uses: renovatebot/github-action@v46.0.2
        with:
          configurationFile: renovate.json
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          LOG_LEVEL: ${{ inputs.logLevel || 'info' }}
          RENOVATE_DRY_RUN: ${{ inputs.dryRun && 'full' || '' }}
          # Scope Renovate to this repository only.
          RENOVATE_REPOSITORIES: ${{ github.repository }}
