name: Renovate

# TODO(egress-firewall): see _validate.yml header. Same egress-firewall
# rollout plan applies here. Allowlist will need npmjs.org, pypi.org,
# proxy.golang.org, sum.golang.org, and the configured Renovate datasources.

# Runs Renovate on a fixed schedule from this repository itself, instead
# of relying on the Mend-hosted Renovate GitHub App. Configuration lives
# in ./renovate.json.
#
# Notes:
#   - GITHUB_TOKEN cannot push changes that modify .github/workflows/*.yml
#     (GitHub blocks this by design). We mint a GitHub App installation
#     token at runtime via actions/create-github-app-token instead.
#   - The cron below controls WHEN Renovate runs. The "schedule" field
#     inside renovate.json controls when it is allowed to OPEN PRs.
#   - Concurrency ensures only one Renovate run at a time; parallel runs
#     can step on each other when updating the same branches.

on:
  schedule:
    # Every 6 hours (00:00, 06:00, 12:00, 18:00 UTC).
    # Rationale: vulnerabilityAlerts in renovate.json bypass schedule /
    # prHourlyLimit / minimumReleaseAge once Renovate runs, but Renovate
    # still only *runs* when this cron fires.  Going from daily to every
    # 6 hours bounds worst-case CVE-to-PR latency at ~6 hours for the
    # self-hosted path.  (For sub-hour response, Dependabot alerts cover
    # the instant-notification channel in parallel.)
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      logLevel:
        description: "Renovate log level"
        type: choice
        options: [info, debug]
        default: info
      dryRun:
        description: "Dry run (log what would change, do not open PRs)"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: renovate
  cancel-in-progress: false

jobs:
  renovate:
    name: Run Renovate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Mint Renovate App installation token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.RENOVATE_APP_ID }}
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run Renovate
        uses: renovatebot/github-action@3633cede7d4d4598438e654eac4a695e46004420 # v46.1.7
        with:
          configurationFile: renovate.json
          token: ${{ steps.app-token.outputs.token }}
        env:
          LOG_LEVEL: ${{ inputs.logLevel || 'info' }}
          RENOVATE_DRY_RUN: ${{ inputs.dryRun && 'full' || '' }}
          # Scope Renovate to this repository only.
          RENOVATE_REPOSITORIES: ${{ github.repository }}
