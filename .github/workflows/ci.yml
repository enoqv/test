name: CI

# Runs on every PR to main and every push to main. Delegates the actual
# validation to the reusable _validate.yml workflow, so the identical
# validation pipeline is used by release.yml before publishing an image.
#
# This workflow does NOT build or push an image. The image release
# pipeline lives in .github/workflows/release.yml and triggers only on
# v*.*.* tags.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    uses: ./.github/workflows/_validate.yml
    permissions:
      contents: read
      security-events: write   # for the scan job to upload SARIF
