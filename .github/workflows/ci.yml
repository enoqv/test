name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read

jobs:
  # -------------------------------------------------------------------
  # P2: Dockerfile lint (hadolint)
  #   Enforces policy on the Dockerfile itself: every FROM must be
  #   pinned to a digest, no :latest, etc.  This is a STATIC check on
  #   the Dockerfile source; it is independent of OCI pull-time digest
  #   verification, which checks the opposite direction (did we get
  #   the bits we asked for?).
  # -------------------------------------------------------------------
  lint:
    name: Lint (hadolint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          config: .hadolint.yaml
          failure-threshold: warning

      # hadolint has no built-in rule for digest pinning (see
      # hadolint/hadolint#773, open since 2022).  DL3006/DL3007 only
      # enforce "has a tag" and "not :latest".  This step fills that gap.
      # Remove once the upstream rule lands and is enabled in .hadolint.yaml.
      - name: Enforce FROM @sha256 digest pin
        run: |
          set -euo pipefail
          unpinned=$(awk '/^FROM/ && $0 !~ /@sha256:[a-f0-9]{64}/ {print NR ": " $0}' Dockerfile || true)
          if [ -n "$unpinned" ]; then
            echo "::error::Unpinned FROM instruction(s) detected:"
            echo "$unpinned"
            exit 1
          fi
          echo "All FROM instructions are pinned to a digest."

  # -------------------------------------------------------------------
  # Go unit tests (unchanged).
  # -------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Download modules
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  # -------------------------------------------------------------------
  # P3: Verify cosign / sigstore signatures of base images.
  #
  # The actual verification is driven by:
  #   - Dockerfile                          (source of truth for FROM refs)
  #   - .github/cosign-image-policy.json    (how each image is verified)
  #   - .github/scripts/verify-base-images.sh  (the glue)
  #
  # This keeps the workflow Dockerfile-agnostic: changing a FROM line or
  # adding a new builder stage does NOT require touching this file.
  # Any FROM whose image name has no entry in the policy file will fail
  # the job with a clear message -- forcing a conscious decision on
  # whether to verify it or add it to the unsigned allow-list.
  # -------------------------------------------------------------------
  verify-base-images:
    name: Verify base image signatures
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.1

      - name: Verify all FROM base images against policy
        run: bash .github/scripts/verify-base-images.sh Dockerfile

  # -------------------------------------------------------------------
  # Build multi-arch image, push to GHCR, then P4: Trivy CVE scan.
  # -------------------------------------------------------------------
  build-and-push:
    name: Build, scan and push multi-arch image
    runs-on: ubuntu-latest
    needs: [lint, test, verify-base-images]
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      # P4 step 1: Build a local single-arch image for scanning first.
      # Trivy needs a concrete image to scan; scanning before push means
      # vulnerable images never reach the registry.
      - name: Build local image for scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: local/scan-target:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Trivy runs twice by design:
      #   1. "table" format to stdout for human-readable CI log output.
      #      Scanners are restricted to vuln only -- secret scanning
      #      stays off here because this log is publicly viewable on
      #      a public repo and we do not want any accidental secret
      #      detection to be broadcast to the world.  exit-code: 0 so
      #      this step never blocks; it is purely informational.
      #   2. "sarif" format into trivy-results.sarif, uploaded to the
      #      GitHub Security tab (which is access-restricted), with the
      #      full default scanner set.  This step is the actual gate
      #      (exit-code: 1 on fixable CRITICAL/HIGH).
      - name: Trivy scan (human-readable log)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: local/scan-target:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: "0"
          ignore-unfixed: true
          vuln-type: os,library
          scanners: vuln

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: local/scan-target:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library

      - name: Upload Trivy SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy

      # P4 step 2: Only reached if the scan passed.
      - name: Build and push multi-arch image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
