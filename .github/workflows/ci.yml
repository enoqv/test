name: CI

# Runs on every PR to main and every push to main. Validates the change
# (lint + test + base-image signatures) but does NOT build or push an
# image. The image release pipeline lives in .github/workflows/release.yml
# and triggers only on v*.*.* tags.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # -------------------------------------------------------------------
  # P2: Dockerfile lint (hadolint)
  #   Enforces policy on the Dockerfile itself: every FROM must be
  #   pinned to a digest, no :latest, etc.  This is a STATIC check on
  #   the Dockerfile source; it is independent of OCI pull-time digest
  #   verification, which checks the opposite direction (did we get
  #   the bits we asked for?).
  # -------------------------------------------------------------------
  lint:
    name: Lint (hadolint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          config: .hadolint.yaml
          failure-threshold: warning

      # hadolint has no built-in rule for digest pinning (see
      # hadolint/hadolint#773, open since 2022).  DL3006/DL3007 only
      # enforce "has a tag" and "not :latest".  This step fills that gap.
      # Remove once the upstream rule lands and is enabled in .hadolint.yaml.
      - name: Enforce FROM @sha256 digest pin
        run: |
          set -euo pipefail
          unpinned=$(awk '/^FROM/ && $0 !~ /@sha256:[a-f0-9]{64}/ {print NR ": " $0}' Dockerfile || true)
          if [ -n "$unpinned" ]; then
            echo "::error::Unpinned FROM instruction(s) detected:"
            echo "$unpinned"
            exit 1
          fi
          echo "All FROM instructions are pinned to a digest."

  # -------------------------------------------------------------------
  # Go unit tests.
  # -------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Download modules
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  # -------------------------------------------------------------------
  # P3: Verify cosign / sigstore signatures of base images.
  #
  # The actual verification is driven by:
  #   - Dockerfile                          (source of truth for FROM refs)
  #   - .github/cosign-image-policy.json    (how each image is verified)
  #   - .github/scripts/verify-base-images.sh  (the glue)
  #
  # This keeps the workflow Dockerfile-agnostic: changing a FROM line or
  # adding a new builder stage does NOT require touching this file.
  # Any FROM whose image name has no entry in the policy file will fail
  # the job with a clear message -- forcing a conscious decision on
  # whether to verify it or add it to the unsigned allow-list.
  # -------------------------------------------------------------------
  verify-base-images:
    name: Verify base image signatures
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.1

      - name: Verify all FROM base images against policy
        run: bash .github/scripts/verify-base-images.sh Dockerfile
