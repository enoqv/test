name: CI

# Runs on every PR to main and every push to main. Delegates the actual
# validation to the reusable _validate.yml workflow, so the identical
# validation pipeline is used by publish.yml before publishing an image.
#
# This workflow does NOT build or push an image. The image publish
# pipeline lives in .github/workflows/publish.yml and triggers only on
# v*.*.* tags.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded PR runs; never cancel runs on main (we always want a
# complete validation history for every commit that lands).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  validate:
    uses: ./.github/workflows/_validate.yml
    permissions:
      contents: read
      security-events: write   # for the scan job to upload SARIF
