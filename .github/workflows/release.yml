name: Release

# Triggered ONLY on pushed tags matching v*.*.* (semver).
# Builds the multi-arch image, scans it, pushes to GHCR, signs it
# keyless via sigstore, and re-verifies the signature as a smoke test.
#
# CI (lint / test / verify-base-images) runs separately on every push
# and PR to main; a release tag is expected to point at a commit that
# already passed CI.  If you want extra safety, re-run ci.yml on the
# tag's commit before tagging.

on:
  push:
    tags:
      - "v*.*.*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# Top-level permissions are intentionally the least-privileged default.
# Capabilities needed by individual jobs (packages: write for push,
# id-token: write for keyless cosign signing, security-events: write
# for SARIF upload, etc.) are granted on the job itself. Keeping
# id-token at job-level only means a future job added without an
# explicit permissions block will NOT inherit OIDC access.
permissions:
  contents: read

jobs:
  # -------------------------------------------------------------------
  # Build multi-arch image, scan, push to GHCR, sign, attach SBOM
  # and SLSA provenance attestations.
  # -------------------------------------------------------------------
  build-and-push:
    name: Build, scan, push, sign and attest multi-arch image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
      id-token: write  # P5: keyless cosign signing
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tag strategy for semver tag events (v1.2.3):
      #   - 1.2.3        (exact version)
      #   - 1.2          (major.minor rolling)
      #   - 1            (major rolling)
      #   - sha-abc1234  (commit traceability)
      #   - latest       (auto: only on stable semver, not on prereleases)
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,format=short
          flavor: |
            latest=auto

      # P4 step 1: Build a local single-arch image for scanning first.
      # Trivy needs a concrete image to scan; scanning before push means
      # vulnerable images never reach the registry.
      - name: Build local image for scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: local/scan-target:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Trivy runs twice by design:
      #   1. "table" format to stdout for human-readable CI log output.
      #      Scanners are restricted to vuln only -- secret scanning
      #      stays off here because this log is publicly viewable on
      #      a public repo and we do not want any accidental secret
      #      detection to be broadcast to the world.  exit-code: 0 so
      #      this step never blocks; it is purely informational.
      #   2. "sarif" format into trivy-results.sarif, uploaded to the
      #      GitHub Security tab (which is access-restricted), with the
      #      full default scanner set.  This step is the actual gate
      #      (exit-code: 1 on fixable CRITICAL/HIGH).
      - name: Trivy scan (human-readable log)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: local/scan-target:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: "0"
          ignore-unfixed: true
          vuln-type: os,library
          scanners: vuln

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: local/scan-target:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library

      - name: Upload Trivy SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy

      # Only reached if the scan passed.
      # P5: also request SBOM and SLSA provenance attestations.
      #     build-push-action attaches them to the image in the registry
      #     as in-toto attestations (no separate syft/cosign-attest step).
      - name: Build and push multi-arch image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: mode=max

      # ---------------------------------------------------------------
      # P5: Sign the pushed image keyless via sigstore.
      # SBOM and provenance are produced by build-push-action above;
      # this step adds the image-level signature on top of that.
      # ---------------------------------------------------------------
      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.1

      - name: Sign image (keyless)
        env:
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          image_ref="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}"
          echo "Signing $image_ref"
          cosign sign "$image_ref"

  # -------------------------------------------------------------------
  # P5 verification: re-verify our own signature on the pushed image.
  # Smoke test so that a signing misconfiguration is caught here,
  # not by a downstream consumer.  Uses the digest output from the
  # build-and-push job for a precise, unambiguous reference.
  # -------------------------------------------------------------------
  verify-published-image:
    name: Verify our own signature
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      packages: read
      id-token: write
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.1

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify signature
        run: |
          set -euo pipefail
          ref="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-and-push.outputs.digest }}"
          cosign verify \
            --certificate-oidc-issuer='https://token.actions.githubusercontent.com' \
            --certificate-identity-regexp="^https://github\.com/${{ github.repository }}/\.github/workflows/.+@refs/tags/v.+" \
            "$ref"
