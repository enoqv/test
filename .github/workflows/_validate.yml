name: Validate (reusable)

# Reusable validation pipeline called by ci.yml (on PR / main push) and
# by release.yml (on v*.*.* tag push). Keeps the validation rules in a
# single place so the gate is identical whichever entry point triggers it.

on:
  workflow_call:

jobs:
  # -------------------------------------------------------------------
  # P2: Dockerfile lint (hadolint + digest-pin policy).
  # -------------------------------------------------------------------
  lint:
    name: Lint (hadolint)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run hadolint
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: Dockerfile
          config: .hadolint.yaml
          failure-threshold: warning

      # hadolint has no built-in rule for digest pinning (see
      # hadolint/hadolint#773, open since 2022). DL3006/DL3007 only
      # enforce "has a tag" and "not :latest". This step fills that gap.
      - name: Enforce FROM @sha256 digest pin
        run: |
          set -euo pipefail
          unpinned=$(awk '/^FROM/ && $0 !~ /@sha256:[a-f0-9]{64}/ {print NR ": " $0}' Dockerfile || true)
          if [ -n "$unpinned" ]; then
            echo "::error::Unpinned FROM instruction(s) detected:"
            echo "$unpinned"
            exit 1
          fi
          echo "All FROM instructions are pinned to a digest."

  # -------------------------------------------------------------------
  # Go unit tests.
  # -------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage
          path: coverage.out

  # -------------------------------------------------------------------
  # govulncheck: Go's official reachability-aware vulnerability scanner.
  # Unlike Trivy (which reports every CVE in a Go binary's transitive
  # dependency set), govulncheck only flags CVEs whose vulnerable symbols
  # are actually reachable from our code. For stdlib CVEs it dramatically
  # cuts noise.  Fails on any reported vulnerability; fixes arrive via
  # go.mod bumps or a Go-version upgrade (handled by Renovate).
  #
  # Uses the official golang/govulncheck-action rather than
  # `go install ... @latest` so the tool version is itself pinned to a
  # SHA (kept up to date by Renovate with every other pinned action).
  # -------------------------------------------------------------------
  govulncheck:
    name: Govulncheck (Go vulnerability reachability)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run govulncheck
        uses: golang/govulncheck-action@b625fbe08f3bccbe446d94fbf87fcc875a4f50ee # v1.0.4
        with:
          go-version-file: go.mod
          # The action's default `repo-checkout: true` runs git inside the
          # action itself. Since actions/checkout@v6 persists credentials to
          # a separate includeIf'd file, that inner git call picks up a bad
          # auth header and GitHub returns HTTP 400. We already checked out
          # above, so skip the action's redundant second checkout.
          repo-checkout: false

  # -------------------------------------------------------------------
  # P3: Verify cosign/sigstore signatures of pinned base images against
  # .github/cosign-image-policy.json. Dockerfile-agnostic.
  # -------------------------------------------------------------------
  verify-base-images:
    name: Verify base image signatures
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Verify all FROM base images against policy
        run: bash .github/scripts/verify-base-images.sh Dockerfile

  # -------------------------------------------------------------------
  # P4: Trivy CVE scan. Builds an amd64 image into the local daemon
  # (no registry push), scans, and uploads SARIF to GitHub code scanning.
  # -------------------------------------------------------------------
  scan:
    name: Trivy CVE scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build local image for scanning
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: local/scan-target:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Single Trivy scan: emits SARIF for the GitHub Security tab AND
      # fails the job on CRITICAL or HIGH. The upload-sarif step runs
      # with if: always() so the Security tab still gets populated even
      # when the scan step exits non-zero.
      #
      # govulncheck (in the test job above) provides a tighter filter for
      # Go-specific CVEs by reachability; Trivy covers OS packages and
      # non-Go libraries in the final image that govulncheck cannot see.
      - name: Trivy vulnerability scan (block on CRITICAL + HIGH)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: local/scan-target:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library

      - name: Upload Trivy SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          sarif_file: trivy-results.sarif
          category: trivy
