name: Validate (reusable)

# Reusable validation pipeline called by ci.yml (on PR / main push) and
# by release.yml (on v*.*.* tag push). Keeps the validation rules in a
# single place so the gate is identical whichever entry point triggers it.

on:
  workflow_call:

jobs:
  # -------------------------------------------------------------------
  # P2: Dockerfile lint (hadolint + digest-pin policy).
  # -------------------------------------------------------------------
  lint:
    name: Lint (hadolint)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Run hadolint
        uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf # v3.1.0
        with:
          dockerfile: Dockerfile
          config: .hadolint.yaml
          failure-threshold: warning

      # hadolint has no built-in rule for digest pinning (see
      # hadolint/hadolint#773, open since 2022). DL3006/DL3007 only
      # enforce "has a tag" and "not :latest". This step fills that gap.
      - name: Enforce FROM @sha256 digest pin
        run: |
          set -euo pipefail
          unpinned=$(awk '/^FROM/ && $0 !~ /@sha256:[a-f0-9]{64}/ {print NR ": " $0}' Dockerfile || true)
          if [ -n "$unpinned" ]; then
            echo "::error::Unpinned FROM instruction(s) detected:"
            echo "$unpinned"
            exit 1
          fi
          echo "All FROM instructions are pinned to a digest."

  # -------------------------------------------------------------------
  # Go unit tests.
  # -------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: "1.22"
          cache: true

      - name: Download modules
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage
          path: coverage.out

  # -------------------------------------------------------------------
  # P3: Verify cosign/sigstore signatures of pinned base images against
  # .github/cosign-image-policy.json. Dockerfile-agnostic.
  # -------------------------------------------------------------------
  verify-base-images:
    name: Verify base image signatures
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Verify all FROM base images against policy
        run: bash .github/scripts/verify-base-images.sh Dockerfile

  # -------------------------------------------------------------------
  # P4: Trivy CVE scan. Builds an amd64 image into the local daemon
  # (no registry push), scans, and uploads SARIF to GitHub code scanning.
  # -------------------------------------------------------------------
  scan:
    name: Trivy CVE scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Build local image for scanning
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: local/scan-target:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Trivy runs twice: table for human-readable public log
      # (vuln-only scanners for public-log safety); sarif for
      # upload to access-restricted GitHub Security tab.
      - name: Trivy scan (human-readable log)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: local/scan-target:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: "0"
          ignore-unfixed: true
          vuln-type: os,library
          scanners: vuln

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: local/scan-target:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library

      - name: Upload Trivy SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@5c8a8a642e79153f5d047b10ec1cba1d1cc65699 # v3.35.1
        with:
          sarif_file: trivy-results.sarif
          category: trivy
