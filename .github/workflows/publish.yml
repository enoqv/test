name: Publish

# TODO(egress-firewall): see _validate.yml header. Same egress-firewall
# rollout plan applies here. This workflow has the highest blast radius
# (id-token + packages:write), so enable Block mode here first once the
# native firewall reaches GA.

# Triggered only on pushed tags matching v*.*.* (semver).
#
# Renamed from release.yml on 2026-05-20. "Publish" describes what this
# workflow actually does (push artifact, sign, attest); "release" overloads
# git tag, SemVer, and GitHub Release object semantics. Image signatures
# from tags pushed before the rename carry the old workflow identity --
# see docs/branch-protection.md for the two corresponding cosign verify
# commands.
#
# Flow:
#   1. guard                  -- reject tags not reachable from main
#   2. validate               -- reuse the same _validate.yml as PR CI
#   3. build-and-push         -- multi-arch build, SBOM + SLSA, push, sign
#   4. verify-published-image -- re-verify own signature (smoke test)
#
# Each step gates the next, so a tag on a non-main commit, a failing
# lint / test / verify-base-images / scan, or a broken build all stop
# the pipeline before anything is published.

on:
  push:
    tags:
      - "v*.*.*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# Never cancel an in-flight publish: a partial run can leave half-signed
# or half-attested artifacts. One tag, one run, run it to completion.
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

# Top-level permissions are intentionally the least-privileged default.
# Capabilities needed by individual jobs (packages: write for push,
# id-token: write for keyless cosign signing, security-events: write
# for SARIF upload, etc.) are granted on the job itself. Keeping
# id-token at job-level only means a future job added without an
# explicit permissions block will NOT inherit OIDC access.
permissions:
  contents: read

jobs:
  # -------------------------------------------------------------------
  # C+: reject tags that don't point at a commit reachable from main.
  # Protects against tagging a random feature branch or arbitrary SHA
  # and thereby skipping the PR / main CI gate entirely.
  # -------------------------------------------------------------------
  guard:
    name: Tag must be on main
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Verify tag is an ancestor of main
        run: |
          set -euo pipefail
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Tag $GITHUB_REF_NAME ($GITHUB_SHA) is not reachable from origin/main."
            echo "::error::Only tag commits that are already on main (and have passed CI)."
            exit 1
          fi
          echo "OK: tag $GITHUB_REF_NAME is on main."

  # -------------------------------------------------------------------
  # B: reuse the same validation pipeline as ci.yml. Runs lint, test,
  # verify-base-images and Trivy scan against the tagged commit, so the
  # gate is identical to what a PR sees -- no drift.
  # -------------------------------------------------------------------
  validate:
    needs: guard
    uses: ./.github/workflows/_validate.yml
    permissions:
      contents: read
      security-events: write

  # -------------------------------------------------------------------
  # Multi-arch build, push, sign, SBOM + SLSA provenance attest.
  # -------------------------------------------------------------------
  build-and-push:
    name: Build, push, sign and attest multi-arch image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: validate
    permissions:
      contents: read
      packages: write
      id-token: write       # keyless cosign signing + GitHub OIDC attestations
      attestations: write   # write SLSA provenance to the GitHub attestation API
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tag strategy for semver tag events (v1.2.3):
      #   - 1.2.3        (exact version, *.*.*)
      #   - latest       (auto: only on stable semver, not on prereleases)
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
          flavor: |
            latest=auto

      # Trivy CVE scan already ran in validate (same Dockerfile, same
      # commit, same base image digests). Go straight to multi-arch
      # push with SBOM + SLSA provenance attestations attached.
      - name: Build and push multi-arch image
        id: push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: mode=max

      # Native GitHub artifact attestation in addition to the in-image
      # provenance attached by build-push-action above. With this, downstream
      # consumers can run `gh attestation verify` against the published image
      # without needing cosign installed.
      - name: Attest build provenance (GitHub-native)
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      # Generate an SBOM of the pushed image. build-push-action above already
      # attaches an SBOM attestation in-image (BuildKit/syft), but we also
      # publish the SBOM to GitHub's first-party attestation API so it can
      # be retrieved by `gh attestation verify --predicate-type spdx`.
      - name: Generate SBOM (SPDX) with syft
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json

      # NOTE: actions/attest-sbom is being deprecated in favor of the
      # generic actions/attest. Use actions/attest with SPDX predicate.
      - name: Attest SBOM (GitHub-native)
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          predicate-type: 'https://spdx.dev/Document'
          predicate-path: sbom.spdx.json
          push-to-registry: true

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign image (keyless)
        env:
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          image_ref="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}"
          echo "Signing $image_ref"
          cosign sign "$image_ref"

  # -------------------------------------------------------------------
  # Smoke-test: re-verify the signature we just produced, against the
  # expected workflow identity (tag-push only). Catches signing
  # misconfiguration here rather than in a downstream consumer.
  # -------------------------------------------------------------------
  verify-published-image:
    name: Verify our own signature
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build-and-push
    permissions:
      contents: read
      packages: read
      id-token: write
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify signature
        run: |
          set -euo pipefail
          ref="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-and-push.outputs.digest }}"
          cosign verify \
            --certificate-oidc-issuer='https://token.actions.githubusercontent.com' \
            --certificate-identity-regexp="^https://github\.com/${{ github.repository }}/\.github/workflows/publish\.yml@refs/tags/v.+" \
            "$ref"
