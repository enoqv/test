name: CodeQL

# TODO(egress-firewall): see _validate.yml header. Same rollout plan.

# Static analysis (Go) via GitHub's CodeQL. Complementary to:
#   - govulncheck (known CVEs in our DEPENDENCIES)
#   - golangci-lint / gosec (lint-style patterns in our own code)
# CodeQL queries follow taint flows across function boundaries and can
# catch SQL injection, command injection, path traversal, and unsafe
# deserialization that pattern matchers miss.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Monday 06:00 UTC so newly-published query updates run against
    # the codebase even when nothing is being committed.
    - cron: "0 6 * * 1"

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  analyze:
    name: Analyze (Go)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write   # upload SARIF to the Security tab
      actions: read            # CodeQL requires this on private repos
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          languages: go
          queries: security-and-quality

      # Go is a compiled language; CodeQL's autobuild understands go.mod
      # and builds without any extra configuration.
      - name: Autobuild
        uses: github/codeql-action/autobuild@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          category: codeql-go
